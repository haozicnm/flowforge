name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Rust backend ──────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

  # ── Flutter frontend ─────────────────────────────────────────
  flutter:
    name: Flutter (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Pub get
        run: flutter pub get
        working-directory: flutter_app

      - name: Analyze
        run: flutter analyze --no-fatal-infos
        working-directory: flutter_app

      - name: Test
        run: flutter test
        working-directory: flutter_app
        continue-on-error: true

  # ── Combined summary ─────────────────────────────────────────
  done:
    name: CI Complete
    needs: [rust, flutter]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
