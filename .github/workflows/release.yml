name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Windows: Flutter + Rust + Inno Setup installer ────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Rust build
        run: cargo build --release

      - name: Flutter build
        working-directory: flutter_app
        run: flutter build windows --release

      - name: Assemble distribution
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace 'v',''
          $dist = "dist\$version"
          New-Item -ItemType Directory -Force -Path "$dist\data"
          New-Item -ItemType Directory -Force -Path "$dist\backend"

          # Copy Rust backend
          Copy-Item "target\release\flowforge.exe" "$dist\backend\"

          # Copy Flutter build
          Copy-Item "flutter_app\build\windows\x64\runner\Release\*" "$dist\" -Recurse

          # Create launcher batch
          @"
          @echo off
          cd /d "%~dp0"
          start /B "" "backend\flowforge.exe"
          timeout /t 2 /nobreak >nul
          set SERVER_URL=http://127.0.0.1:19529
          start "" "flowforge.exe"
          "@ | Out-File -Encoding ascii "$dist\FlowForge.bat"

          # Create Inno Setup script
          @"
          [Setup]
          AppName=FlowForge
          AppVersion=$version
          AppPublisher=FlowForge
          DefaultDirName={autopf}\FlowForge
          DefaultGroupName=FlowForge
          OutputBaseFilename=FlowForge-v${version}-Setup
          Compression=lzma2
          SolidCompression=yes
          OutputDir=installer

          [Files]
          Source: "$dist\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\FlowForge"; Filename: "{app}\FlowForge.bat"
          Name: "{commondesktop}\FlowForge"; Filename: "{app}\FlowForge.bat"

          [Run]
          Filename: "{app}\FlowForge.bat"; Description: "Launch FlowForge"; Flags: postinstall nowait
          "@ | Out-File -Encoding ascii "installer.iss"

          # Build installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-windows-installer
          path: installer/FlowForge-*-Setup.exe

      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-windows-binary
          path: dist/

  # ── Linux: Flutter + Rust + tar.gz ────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Rust build
        run: cargo build --release

      - name: Flutter build
        working-directory: flutter_app
        run: flutter build linux --release

      - name: Assemble distribution
        run: |
          version="${GITHUB_REF_NAME#v}"
          dist="dist/$version"
          mkdir -p "$dist/backend" "$dist/data"

          cp target/release/flowforge "$dist/backend/"
          cp -r flutter_app/build/linux/x64/release/bundle/* "$dist/"

          cat > "$dist/flowforge.sh" << 'EOF'
          #!/usr/bin/env bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          "$SCRIPT_DIR/backend/flowforge" &
          sleep 1
          export SERVER_URL=http://127.0.0.1:19529
          "$SCRIPT_DIR/flowforge"
          EOF
          chmod +x "$dist/flowforge.sh"

          cd dist
          tar -czf "FlowForge-v${version}-linux-x64.tar.gz" "$version/"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-linux
          path: dist/FlowForge-*-linux-x64.tar.gz

  # ── macOS: Flutter + Rust + zip ───────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Rust build
        run: cargo build --release

      - name: Flutter build
        working-directory: flutter_app
        run: flutter build macos --release

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp target/release/flowforge "flutter_app/build/macos/Build/Products/Release/flowforge.app/Contents/MacOS/backend"
          cd flutter_app/build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/FlowForge-v${version}-macos.zip" flowforge.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-macos
          path: FlowForge-*-macos.zip

  # ── Create GitHub Release ─────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/flowforge-windows-installer/*.exe
            artifacts/flowforge-linux/*.tar.gz
            artifacts/flowforge-macos/*.zip
          generate_release_notes: true
