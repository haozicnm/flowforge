name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Windows: Flutter + Rust → zip ─────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Rust build
        run: cargo build --release

      - name: Flutter build
        working-directory: flutter_app
        run: flutter build windows --release

      - name: Assemble distribution
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace 'v',''
          $dist = "FlowForge-v${v}-windows-x64"
          New-Item -ItemType Directory -Force -Path "$dist"
          New-Item -ItemType Directory -Force -Path "$dist\data"
          New-Item -ItemType Directory -Force -Path "$dist\backend"

          # Copy Rust backend
          Copy-Item "target\release\flowforge.exe" "$dist\backend\" -ErrorAction Stop

          # Copy Flutter build
          $flutterDir = "flutter_app\build\windows\x64\runner\Release"
          if (Test-Path $flutterDir) {
            Copy-Item "$flutterDir\*" "$dist\" -Recurse -Force -ErrorAction Stop
          } else {
            Write-Host "Flutter build dir not at $flutterDir, searching..."
            Get-ChildItem flutter_app\build -Recurse -Directory | Where-Object { $_.Name -eq "Release" } | ForEach-Object {
              Copy-Item "$($_.FullName)\*" "$dist\" -Recurse -Force -ErrorAction Stop
            }
          }

          # Launcher
          @"
          @echo off
          cd /d "%~dp0"
          start /B "" "backend\flowforge.exe"
          timeout /t 2 /nobreak >nul
          set SERVER_URL=http://127.0.0.1:19529
          start "" "flowforge.exe"
          "@ | Out-File -Encoding ascii "$dist\FlowForge.bat"

          # Zip
          Compress-Archive -Path "$dist\*" -DestinationPath "${dist}.zip" -Force

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-windows
          path: FlowForge-*-windows-x64.zip

  # ── Linux: Rust backend → tar.gz ──────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Rust build
        run: cargo build --release

      - name: Package
        run: |
          v="${GITHUB_REF_NAME#v}"
          dist="FlowForge-v${v}-linux-x64"
          mkdir -p "$dist/backend" "$dist/data"
          cp target/release/flowforge "$dist/backend/"
          cp docs/*.md "$dist/"

          cat > "$dist/flowforge.sh" << 'SCR'
          #!/usr/bin/env bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          echo "FlowForge v1.0.0"
          echo "Starting backend on http://127.0.0.1:19529 ..."
          "$SCRIPT_DIR/backend/flowforge"
          SCR
          chmod +x "$dist/flowforge.sh"

          tar -czf "${dist}.tar.gz" "$dist/"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-linux
          path: FlowForge-*-linux-x64.tar.gz

  # ── macOS: Rust backend → tar.gz ──────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Rust build
        run: cargo build --release

      - name: Package
        run: |
          v="${GITHUB_REF_NAME#v}"
          dist="FlowForge-v${v}-macos-x64"
          mkdir -p "$dist/backend" "$dist/data"
          cp target/release/flowforge "$dist/backend/"
          cp docs/*.md "$dist/"

          tar -czf "${dist}.tar.gz" "$dist/"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: flowforge-macos
          path: FlowForge-*-macos-x64.tar.gz

  # ── Create GitHub Release ─────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
