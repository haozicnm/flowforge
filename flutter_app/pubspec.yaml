name: flowforge
description: Visual workflow automation engine
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  # State management (BLoC pattern, like AppFlowy)
  flutter_bloc: ^8.1.0
  freezed_annotation: ^2.4.0
  # Dependency injection
  get_it: ^8.0.0
  # Routing
  go_router: ^14.0.0
  # Serialization
  json_annotation: ^4.9.0
  # UI utilities
  intl: ^0.19.0
  styled_widget: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true
